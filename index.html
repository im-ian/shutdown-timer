<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="시간, 분, 초를 입력해 Windows, macOS, Linux 종료 명령어를 만드는 계산기"
    />
    <meta name="theme-color" content="#000000" />
    <title>Shutdown Timer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23000'/%3E%3Cpath d='M32 12v20M18 18a20 20 0 1 0 28 0' fill='none' stroke='%23fff' stroke-width='6'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./script.js"></script>
  </head>
  <body>
    <main class="app">
      <h1>shutdown timer</h1>

      <section class="timer" aria-label="종료까지 남은 시간">
        <div class="time-fields">
          <label class="time-field">
            <span class="sr-only">시간</span>
            <span class="field-control">
              <input
                id="hours"
                name="hours"
                type="number"
                min="0"
                max="9999"
                step="1"
                inputmode="numeric"
                value="1"
                aria-describedby="input-error"
              />
              <span aria-hidden="true">h</span>
            </span>
          </label>

          <span class="time-divider" aria-hidden="true">:</span>

          <label class="time-field">
            <span class="sr-only">분</span>
            <span class="field-control">
              <input
                id="minutes"
                name="minutes"
                type="number"
                min="0"
                max="59"
                step="1"
                inputmode="numeric"
                value="0"
                aria-describedby="input-error"
              />
              <span aria-hidden="true">m</span>
            </span>
          </label>

          <span class="time-divider" aria-hidden="true">:</span>

          <label class="time-field">
            <span class="sr-only">초</span>
            <span class="field-control">
              <input
                id="seconds"
                name="seconds"
                type="number"
                min="0"
                max="59"
                step="1"
                inputmode="numeric"
                value="0"
                aria-describedby="input-error"
              />
              <span aria-hidden="true">s</span>
            </span>
          </label>
        </div>

        <p class="input-error" id="input-error" role="alert"></p>
      </section>

      <div class="os-switcher" role="group" aria-label="운영체제 선택">
        <button type="button" data-os="windows" aria-pressed="true">Windows</button>
        <button type="button" data-os="macos" aria-pressed="false">macOS</button>
        <button type="button" data-os="linux" aria-pressed="false">Linux</button>
      </div>

      <section class="output" aria-label="종료 명령어">
        <div class="command-row">
          <code id="command-output" aria-live="polite">shutdown /s /t 3600</code>
          <button class="copy-button" id="copy-button" type="button">
            <span>복사</span>
          </button>
        </div>

        <p class="usage-note" id="usage-note">
          명령 프롬프트 또는 PowerShell에 붙여 넣으세요. 예약을 취소하려면
          <code>shutdown /a</code>를 실행하세요.
        </p>
      </section>
    </main>
  </body>
</html>
