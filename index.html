<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="시간, 분, 초를 입력해 Windows, macOS, Linux 종료 명령어를 만드는 계산기"
    />
    <meta name="theme-color" content="#000000" />
    <title>Shutdown Timer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23000'/%3E%3Cpath d='M32 12v20M18 18a20 20 0 1 0 28 0' fill='none' stroke='%23fff' stroke-width='6'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./script.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1><span aria-hidden="true">&gt;</span> shutdown timer</h1>
        <p>local only</p>
      </header>

      <section class="section" aria-labelledby="time-heading">
        <div class="section-header">
          <div>
            <span class="section-number">01</span>
            <h2 id="time-heading">종료까지 남은 시간</h2>
          </div>
          <button class="text-button" id="reset-button" type="button">초기화</button>
        </div>

        <div class="time-fields" id="time-fields">
          <label class="time-field">
            <span class="field-label">시간</span>
            <span class="field-control">
              <input
                id="hours"
                name="hours"
                type="number"
                min="0"
                max="9999"
                step="1"
                inputmode="numeric"
                value="1"
                aria-describedby="input-error"
              />
              <span aria-hidden="true">h</span>
            </span>
          </label>

          <span class="time-divider" aria-hidden="true">:</span>

          <label class="time-field">
            <span class="field-label">분</span>
            <span class="field-control">
              <input
                id="minutes"
                name="minutes"
                type="number"
                min="0"
                max="59"
                step="1"
                inputmode="numeric"
                value="0"
                aria-describedby="input-error"
              />
              <span aria-hidden="true">m</span>
            </span>
          </label>

          <span class="time-divider" aria-hidden="true">:</span>

          <label class="time-field">
            <span class="field-label">초</span>
            <span class="field-control">
              <input
                id="seconds"
                name="seconds"
                type="number"
                min="0"
                max="59"
                step="1"
                inputmode="numeric"
                value="0"
                aria-describedby="input-error"
              />
              <span aria-hidden="true">s</span>
            </span>
          </label>
        </div>

        <p class="input-error" id="input-error" role="alert"></p>

        <div class="presets" aria-label="빠른 시간 선택">
          <button type="button" data-seconds="900">15분</button>
          <button type="button" data-seconds="1800">30분</button>
          <button type="button" data-seconds="3600">1시간</button>
          <button type="button" data-seconds="7200">2시간</button>
        </div>
      </section>

      <section class="section" aria-labelledby="os-heading">
        <div class="section-header">
          <div>
            <span class="section-number">02</span>
            <h2 id="os-heading">운영체제</h2>
          </div>
        </div>

        <div class="os-switcher" role="group" aria-label="운영체제 선택">
          <button type="button" data-os="windows" aria-pressed="true">Windows</button>
          <button type="button" data-os="macos" aria-pressed="false">macOS</button>
          <button type="button" data-os="linux" aria-pressed="false">Linux</button>
        </div>
      </section>

      <section class="section result-section" aria-labelledby="command-heading">
        <div class="result-summary" aria-live="polite">
          <span id="duration-display">01:00:00</span>
          <span aria-hidden="true">→</span>
          <strong><span id="seconds-display">3,600</span>초</strong>
        </div>

        <div class="command-block">
          <div class="command-meta">
            <h2 id="command-heading">command</h2>
            <span id="command-kind">WINDOWS · SECONDS</span>
          </div>
          <div class="command-row">
            <code id="command-output">shutdown /s /t 3600</code>
            <button class="copy-button" id="copy-button" type="button">
              <span>복사</span>
            </button>
          </div>
        </div>

        <div class="usage-note">
          <span aria-hidden="true">i</span>
          <p id="usage-note">
            명령 프롬프트 또는 PowerShell에 붙여 넣으세요. 예약을 취소하려면
            <code>shutdown /a</code>를 실행하세요.
          </p>
        </div>
      </section>

      <footer>
        브라우저는 명령어를 직접 실행하지 않습니다.
      </footer>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
